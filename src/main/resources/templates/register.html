<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card mt-5 shadow-lg border-0"
                 style="background:rgba(255,255,255,0.1);
                        backdrop-filter:blur(15px);
                        border-radius:25px;">

                <div class="card-body p-5 text-white">

                    <h1 class="text-center mb-4">
                        Create Your Account
                    </h1>

                    <form th:action="@{/register}"
                          th:object="${user}"
                          method="post">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>Full Name</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{fullname}"
                                       required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>Email</label>

                                <input type="email"
                                       class="form-control"
                                       th:field="*{email}"
                                       required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>Password</label>

                                <input type="password"
                                       class="form-control"
                                       th:field="*{password}"
                                       required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>Mobile</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{mobile}">

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>Experience</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{experience}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>Company</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{company}">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label>City</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{city}">

                        </div>

                        <hr>

                        <h4 class="mb-3">
                            Technologies Interested
                        </h4>

                        <div class="row">

                            <div class="col-md-3">
                                <input type="checkbox" value="AWS" onchange="updateTech()">
                                AWS
                            </div>

                            <div class="col-md-3">
                                <input type="checkbox" value="Docker" onchange="updateTech()">
                                Docker
                            </div>

                            <div class="col-md-3">
                                <input type="checkbox" value="Jenkins" onchange="updateTech()">
                                Jenkins
                            </div>

                            <div class="col-md-3">
                                <input type="checkbox" value="Terraform" onchange="updateTech()">
                                Terraform
                            </div>

                            <div class="col-md-3 mt-2">
                                <input type="checkbox" value="Ansible" onchange="updateTech()">
                                Ansible
                            </div>

                            <div class="col-md-3 mt-2">
                                <input type="checkbox" value="Linux" onchange="updateTech()">
                                Linux
                            </div>

                            <div class="col-md-3 mt-2">
                                <input type="checkbox" value="Git" onchange="updateTech()">
                                Git
                            </div>

                            <div class="col-md-3 mt-2">
                                <input type="checkbox" value="Kubernetes" onchange="updateTech()">
                                Kubernetes
                            </div>

                        </div>

                        <input type="hidden"
                               th:field="*{technologyInterested}"
                               id="technologyInterested">

                        <div class="text-center mt-5">

                            <button type="submit"
                                    class="btn btn-warning btn-lg">

                                Register

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function updateTech(){

    let selected=[];

    document.querySelectorAll('input[type=checkbox]:checked')
        .forEach(cb => selected.push(cb.value));

    document.getElementById("technologyInterested").value =
        selected.join(",");
}

</script>

</body>

</html>
